name: cms-admin-python-ssr

services:
  app:
    container_name: cms-admin-python-ssr
    build: .
    ports:
      - "5004:5004"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5004"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3004}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
